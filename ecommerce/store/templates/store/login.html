{% extends 'store/base.html' %}

{% block content %}

<style>
body {
    background: #f5f7fb;
    font-family: Arial, sans-serif;
}

/* Center layout */
.login-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 80vh;
}

/* Card */
.login-card {
    width: 100%;
    max-width: 420px;
    background: #fff;
    padding: 35px;
    border-radius: 18px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.08);
}

/* Title */
.login-title {
    text-align: center;
    font-weight: 700;
    margin-bottom: 5px;
}

.login-sub {
    text-align: center;
    color: #6b7280;
    font-size: 14px;
    margin-bottom: 25px;
}

/* Labels */
label {
    font-weight: 500;
    display: block;
    margin-bottom: 6px;
}

/* Inputs */
input {
    width: 100%;
    height: 42px;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
    outline: none;
}

/* Focus effect */
input:focus {
    border-color: #2563eb;
    box-shadow: 0 0 5px rgba(37,99,235,0.3);
}

/* Password box */
.password-box {
    position: relative;
}

/* Eye icon */
.toggle-password {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 18px;
    color: #6b7280;
}

/* Button */
.btn-login {
    width: 100%;
    margin-top: 15px;
    padding: 12px;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.btn-login:hover {
    transform: scale(1.02);
}

/* Footer */
.bottom-text {
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
}
</style>

<div class="login-wrapper">

    <div class="login-card">

        <h2 class="login-title">🔐 Welcome Back</h2>
        <p class="login-sub">Login to continue your shopping</p>

        <form method="post">
            {% csrf_token %}

            <!-- Username -->
            <label>Username</label>
            <input type="text" name="username">

            <!-- Password -->
            <label style="margin-top:12px;">Password</label>
            <div class="password-box">
                <input type="password" name="password" id="password">
                <span class="toggle-password" onclick="togglePassword()">👁️</span>
            </div>

            <button type="submit" class="btn-login">
                Login 🚀
            </button>

        </form>

        <div class="bottom-text">
            Don’t have an account?
            <a href="{% url 'register' %}">Create Account</a>
        </div>

    </div>

</div>

<script>
function togglePassword() {
    let input = document.getElementById("password");

    if (input.type === "password") {
        input.type = "text";
    } else {
        input.type = "password";
    }
}
</script>

{% endblock %}
