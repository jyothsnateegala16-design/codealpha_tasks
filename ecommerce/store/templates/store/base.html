<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Store</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
.card{
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.card img{
    height:200px;
    object-fit:cover;
}
</style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand" href="{% url 'home' %}">
            My E-Commerce Store
        </a>

        <div>

    <a href="{% url 'cart' %}" class="btn btn-warning btn-sm">
        🛒 Cart ({{ cart_count }})
    </a>

    <a href="{% url 'order_history' %}" class="btn btn-info btn-sm ms-2">
    📦 My Orders
    </a>
    {% if user.is_authenticated %}

        <span class="text-white me-3">
            Welcome, {{ user.username }}
        </span>

    <form method="post" action="{% url 'logout' %}" style="display:inline;">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger btn-sm">
        Logout
    </button>
</form>

    {% else %}

        <a href="{% url 'login' %}" class="btn btn-primary btn-sm">
            Login
        </a>

        <a href="{% url 'register' %}" class="btn btn-warning btn-sm">
            Register
        </a>

    {% endif %}

</div>

    </div>
</nav>

<!-- 🟢 IMPORTANT PART -->
<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>


<footer class="bg-dark text-white text-center py-3 mt-5">
    <p class="mb-0">
        © 2026 My E-Commerce Store | Developed by <strong>Jyothsna</strong> ❤️
    </p>
</footer>

</body>
</html>
